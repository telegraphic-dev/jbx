name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: cargo test --locked
      - run: cargo fmt --check
